apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: agent-platform
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: agent-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http

# ============================================================================
# AI Adoption Platform -- DevContainer + Local Infrastructure
# Derived from: github.com/trajeshbe/merit-aiml docker-compose (kiaa-gpu)
#
# ISOLATION: All containers use "aiadopt-" prefix, unique host ports (20xxx),
# own network (aiadopt-net), and prefixed volumes. Zero interference with
# existing rag-* or customer_support_assistant_* containers.
#
# Port Map (host -> container):
#   Postgres:  20432 -> 5432
#   Redis:     20379 -> 6379
#   Redis UI:  20380 -> 8001
#   MinIO API: 20900 -> 9000
#   MinIO UI:  20901 -> 9001
#   Ollama:    20434 -> 11434
#   Gateway:   20800 -> 8000
#   Frontend:  20300 -> 3000
# ============================================================================

services:
  devcontainer:
    container_name: aiadopt-devcontainer
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - aiadopt-vscode-extensions:/home/vscode/.vscode-server/extensions
    command: sleep infinity
    networks:
      - aiadopt-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  # ── PostgreSQL 16 + pgvector (same image as merit-aiml) ──────────────
  postgres:
    container_name: aiadopt-postgres
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: agent_platform
      POSTGRES_PASSWORD: agent_platform
    ports:
      - "20432:5432"
    volumes:
      - aiadopt-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aiadopt-net

  # ── Redis 7.2 + RediSearch for VSS (same image as merit-aiml) ───────
  redis:
    container_name: aiadopt-redis
    image: redis/redis-stack:7.2.0-v10
    restart: unless-stopped
    ports:
      - "20379:6379"
      - "20380:8001"
    volumes:
      - aiadopt-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aiadopt-net

  # ── MinIO S3-compatible object store (same image as merit-aiml) ──────
  minio:
    container_name: aiadopt-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "20900:9000"
      - "20901:9001"
    volumes:
      - aiadopt-minio-data:/data
    networks:
      - aiadopt-net

  # ── Ollama LLM inference (same image as merit-aiml) ─────────────────
  # Uncomment deploy section if you have an NVIDIA GPU
  ollama:
    container_name: aiadopt-ollama
    image: ollama/ollama:0.11.0
    restart: unless-stopped
    ports:
      - "20434:11434"
    volumes:
      - aiadopt-ollama-models:/root/.ollama
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - aiadopt-net

volumes:
  aiadopt-vscode-extensions:
  aiadopt-postgres-data:
  aiadopt-redis-data:
  aiadopt-minio-data:
  aiadopt-ollama-models:

networks:
  aiadopt-net:
    name: aiadopt-net
    driver: bridge

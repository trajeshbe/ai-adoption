# OpenTelemetry Collector
# Chart: open-telemetry/opentelemetry-collector
---
mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.110.0

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
      send_batch_max_size: 2048

    memory_limiter:
      check_interval: 5s
      limit_mib: 400
      spike_limit_mib: 100

    resource:
      attributes:
        - key: service.namespace
          value: agent-platform
          action: upsert

  exporters:
    otlp/tempo:
      endpoint: tempo:4317
      tls:
        insecure: true

    loki:
      endpoint: http://loki:3100/loki/api/v1/push

    prometheusremotewrite:
      endpoint: http://mimir:9009/api/v1/push
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
          - resource
        exporters:
          - otlp/tempo

      metrics:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
          - resource
        exporters:
          - prometheusremotewrite

      logs:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
          - resource
        exporters:
          - loki

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

serviceMonitor:
  enabled: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-engine
  namespace: agent-platform
  labels:
    app: agent-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-engine
  template:
    metadata:
      labels:
        app: agent-engine
    spec:
      containers:
        - name: agent-engine
          image: python:3.11-slim
          command: ["python", "-c"]
          args:
            - |
              from http.server import HTTPServer, BaseHTTPRequestHandler
              import urllib.request, json, os
              HOST = os.environ.get("UPSTREAM_HOST", "192.168.49.1")
              PORT = os.environ.get("UPSTREAM_PORT", "8053")
              class Proxy(BaseHTTPRequestHandler):
                  def do_GET(self):
                      try:
                          r = urllib.request.urlopen(f"http://{HOST}:{PORT}{self.path}", timeout=5)
                          data = r.read()
                          self.send_response(r.status)
                          self.send_header("Content-Type", r.headers.get("Content-Type", "application/json"))
                          self.end_headers()
                          self.wfile.write(data)
                      except Exception as e:
                          self.send_response(502)
                          self.end_headers()
                          self.wfile.write(str(e).encode())
                  def do_POST(self):
                      length = int(self.headers.get("Content-Length", 0))
                      body = self.rfile.read(length)
                      try:
                          req = urllib.request.Request(f"http://{HOST}:{PORT}{self.path}", data=body, method="POST")
                          req.add_header("Content-Type", self.headers.get("Content-Type", "application/json"))
                          r = urllib.request.urlopen(req, timeout=120)
                          data = r.read()
                          self.send_response(r.status)
                          self.send_header("Content-Type", r.headers.get("Content-Type", "application/json"))
                          self.end_headers()
                          self.wfile.write(data)
                      except Exception as e:
                          self.send_response(502)
                          self.end_headers()
                          self.wfile.write(str(e).encode())
                  def log_message(self, format, *args): pass
              print(f"Agent-engine proxy on :8003 -> {HOST}:{PORT}")
              HTTPServer(("0.0.0.0", 8003), Proxy).serve_forever()
          ports:
            - containerPort: 8003
          env:
            - name: UPSTREAM_HOST
              value: "192.168.49.1"
            - name: UPSTREAM_PORT
              value: "8053"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-engine
  namespace: agent-platform
spec:
  selector:
    app: agent-engine
  ports:
    - port: 8003
      targetPort: 8003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-engine
  namespace: agent-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-engine
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 10
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30

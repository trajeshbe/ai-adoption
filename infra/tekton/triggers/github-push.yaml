              value: >-
                body.commits.exists(c, c.added.exists(f, f.startsWith('services/agent-engine/'))
                || c.modified.exists(f, f.startsWith('services/agent-engine/'))
                || c.removed.exists(f, f.startsWith('services/agent-engine/')))
      bindings:
        - ref: github-push-binding
        - name: service-name
          value: agent-engine
        - name: image-name
          value: ghcr.io/trajeshbe/agent-engine:$(body.after)
      template:
        ref: github-push-template

    # Document Service
    - name: document-service-trigger
      interceptors:

            - name: eventTypes
              value:
                - push
        - ref:
            name: cel
          params:
            - name: filter
              value: >-
                body.commits.exists(c, c.added.exists(f, f.startsWith('services/cache-service/'))
                || c.modified.exists(f, f.startsWith('services/cache-service/'))
                || c.removed.exists(f, f.startsWith('services/cache-service/')))
      bindings:

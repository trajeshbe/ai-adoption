apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agent-platform

resources:
  - ../../base

patches:
  # 2 replicas for all deployments in staging
  - target:
      kind: Deployment
      group: apps
      version: v1
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  # Standard resources for staging
  - target:
      kind: Deployment
      group: apps
      version: v1
      name: gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  - target:
      kind: Deployment
      group: apps
      version: v1
      name: agent-engine
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

  - target:
      kind: Deployment
      group: apps
      version: v1
      name: llm-runtime-llamacpp
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 8Gi

  # HPA ranges for staging
  - target:
      kind: HorizontalPodAutoscaler
      group: autoscaling
      version: v2
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 4

  # Staging log level
  - target:
      kind: Deployment
      group: apps
      version: v1
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_LEVEL
          value: INFO

commonLabels:
  environment: staging

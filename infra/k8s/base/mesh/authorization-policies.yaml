apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: agent-platform
spec:
  {}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: gateway-policy
  namespace: agent-platform
spec:
  selector:
    matchLabels:
      app: gateway
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - contour-envoy
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: agent-engine-policy
  namespace: agent-platform
spec:
  selector:
    matchLabels:
      app: agent-engine
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/agent-platform/sa/gateway
---
apiVersion: security.istio.io/v1

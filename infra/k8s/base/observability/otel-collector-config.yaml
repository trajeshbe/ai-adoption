apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512

      memory_limiter:
        check_interval: 5s
        limit_mib: 512
        spike_limit_mib: 128

      attributes:
        actions:
          - key: cluster
            value: agent-platform
            action: upsert
          - key: namespace
            from_attribute: k8s.namespace.name
            action: upsert

    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

      loki:
        endpoint: http://loki:3100/loki/api/v1/push

      prometheusremotewrite:
        endpoint: http://mimir:9009/api/v1/push
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
            - attributes
          exporters:
            - otlp/tempo

        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
            - attributes
          exporters:
            - prometheusremotewrite

        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
            - attributes
          exporters:
            - loki

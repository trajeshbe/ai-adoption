version: "3"

vars:
  SERVICES: gateway agent-engine document-service cache-service cost-tracker
  REGISTRY: ghcr.io/your-org/agent-platform

tasks:
  # ── Development ──────────────────────────────
  dev:
    desc: Start DevContainer + local infra
    cmds:
      - docker compose -f .devcontainer/docker-compose.yml up -d
    silent: true

  dev:down:
    desc: Stop local infra
    cmds:
      - docker compose -f .devcontainer/docker-compose.yml down

  # ── Quality ──────────────────────────────────
  lint:
    desc: Run all linters
    cmds:
      - uv run ruff check services/ libs/py-common/
      - uv run mypy services/ libs/py-common/ --strict --ignore-missing-imports
      - cd frontend && pnpm lint

  fmt:
    desc: Auto-format all code
    cmds:
      - uv run ruff check --fix services/ libs/py-common/
      - uv run ruff format services/ libs/py-common/
      - cd frontend && pnpm format

  # ── Testing ──────────────────────────────────
  test:
    desc: Run all unit tests
    cmds:
      - uv run pytest services/*/tests/unit/ libs/py-common/tests/ -v --tb=short
      - cd frontend && pnpm test

  test:integration:
    desc: Run integration tests
    cmds:
      - uv run pytest services/*/tests/integration/ tests/integration/ -v

  test:e2e:
    desc: Run end-to-end tests
    cmds:
      - uv run pytest tests/e2e/ -v
      - cd frontend && pnpm test:e2e

  test:load:
    desc: Run load tests
    cmds:
      - uv run locust -f tests/load/locustfile.py --headless -u 100 -r 10 -t 60s

  # ── Build ────────────────────────────────────
  build:
    desc: Build all container images
    cmds:
      - for: { var: SERVICES }
        cmd: docker build -t {{.REGISTRY}}/{{.ITEM}}:latest services/{{.ITEM}}/
      - docker build -t {{.REGISTRY}}/frontend:latest frontend/

  # ── Deploy ───────────────────────────────────
  deploy:local:
    desc: Deploy to local K8s via Skaffold
    cmds:
      - skaffold dev --port-forward

  # ── Codegen ──────────────────────────────────
  graphql:codegen:
    desc: Generate GraphQL client types
    cmds:
      - ./scripts/generate-graphql.sh

                - push
        - ref:
            name: cel
          params:
            - name: filter
              value: >-
                body.commits.exists(c, c.added.exists(f, f.startsWith('services/cost-tracker/'))
                || c.modified.exists(f, f.startsWith('services/cost-tracker/'))
                || c.removed.exists(f, f.startsWith('services/cost-tracker/')))
      bindings:
        - ref: github-push-binding
        - name: service-name
          value: cost-tracker
        - name: image-name
          value: ghcr.io/trajeshbe/cost-tracker:$(body.after)
      template:
        ref: github-push-template

    # Frontend
    - name: frontend-trigger
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value:
                - push
        - ref:
            name: cel
          params:
            - name: filter
              value: >-
                body.commits.exists(c, c.added.exists(f, f.startsWith('frontend/'))

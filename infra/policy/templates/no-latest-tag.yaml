apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snolatestimage
  annotations:
    description: >-
      Blocks container images using the :latest tag or no tag at all.
      All container images must specify an explicit version tag for
      reproducible deployments.
spec:
  crd:
    spec:
      names:
        kind: K8sNoLatestImage
      validation:
        openAPIV3Schema:
          type: object
          properties: {}
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snolatestimage

        violation[{"msg": msg}] {
          container := input_containers[_]
          image := container.image
          has_latest_tag(image)
          msg := sprintf("Container <%v> uses the :latest tag in image <%v>. All images must use explicit version tags", [
            container.name,
            image,
          ])
        }

        violation[{"msg": msg}] {
          container := input_containers[_]
          image := container.image
          not contains(image, ":")
          not contains(image, "@")
          msg := sprintf("Container <%v> has no tag specified in image <%v>. All images must use explicit version tags", [
            container.name,
            image,
          ])
        }

        has_latest_tag(image) {
          endswith(image, ":latest")
        }

        input_containers[c] {
          c := input.review.object.spec.containers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.initContainers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.template.spec.containers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.template.spec.initContainers[_]
        }

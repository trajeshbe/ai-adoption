apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agent-platform

resources:
  - ../../base

patches:
  # 3 replicas for all deployments in prod
  - target:
      kind: Deployment
      group: apps
      version: v1
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

  # Strict resource limits for prod
  - target:
      kind: Deployment
      group: apps
      version: v1
      name: gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

  - target:
      kind: Deployment
      group: apps
      version: v1
      name: agent-engine
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi

  - target:
      kind: Deployment
      group: apps
      version: v1
      name: document-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

  - target:
      kind: Deployment
      group: apps
      version: v1
      name: cache-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  - target:
      kind: Deployment
      group: apps
      version: v1
      name: cost-tracker
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  - target:
      kind: Deployment
      group: apps
      version: v1
      name: frontend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

  - target:
      kind: Deployment
      group: apps
      version: v1
      name: llm-runtime-llamacpp
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 8Gi

  # Pod anti-affinity for all deployments in prod
  - target:
      kind: Deployment
      group: apps
      version: v1
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - "$(POD_LABEL)"
                  topologyKey: kubernetes.io/hostname

  # HPA ranges for prod
  - target:
      kind: HorizontalPodAutoscaler
      group: autoscaling
      version: v2
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 10

  # PDB for prod - require at least 2 available
  - target:
      kind: PodDisruptionBudget
      group: policy
      version: v1
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 2

  # Prod log level
  - target:
      kind: Deployment
      group: apps
      version: v1
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_LEVEL
          value: WARNING

commonLabels:
  environment: prod

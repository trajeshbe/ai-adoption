apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: agent-platform
  labels:
    app.kubernetes.io/name: document-service
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: document-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: document-service
        app.kubernetes.io/part-of: agent-platform
        app.kubernetes.io/component: storage
    spec:
      serviceAccountName: document-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: document-service
          image: ghcr.io/agent-platform/document-service:latest
          ports:
            - containerPort: 8001
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: document-service-config
            - secretRef:
                name: document-service-secrets
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              value: document-service
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

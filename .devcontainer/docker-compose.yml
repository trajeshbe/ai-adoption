# ============================================================================
# DevContainer + Local Infrastructure
# Derived from: github.com/trajeshbe/merit-aiml docker-compose.yml (kiaa-gpu)
#
# Services:
#   - devcontainer: Development environment with all tools
#   - postgres:     PostgreSQL 16 + pgvector extension
#   - redis:        Redis 7.2 + RediSearch (VSS semantic cache)
#   - minio:        S3-compatible object storage
#   - ollama:       Local LLM inference (optional GPU)
# ============================================================================

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - devcontainer-extensions:/home/vscode/.vscode-server/extensions
    command: sleep infinity
    networks:
      - agent-platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  # ── PostgreSQL + pgvector (from merit-aiml) ──────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: agent_platform
      POSTGRES_PASSWORD: agent_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-platform

  # ── Redis 7.2 + RediSearch for VSS (from merit-aiml) ────────────────
  redis:
    image: redis/redis-stack:7.2.0-v10
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-platform

  # ── MinIO S3-compatible object store (from merit-aiml) ───────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - agent-platform

  # ── Ollama LLM inference (optional, GPU-aware) ──────────────────────
  # Uncomment deploy section if you have an NVIDIA GPU
  ollama:
    image: ollama/ollama:0.11.0
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - agent-platform

volumes:
  devcontainer-extensions:
  postgres_data:
  redis_data:
  minio_data:
  ollama_models:

networks:
  agent-platform:
    driver: bridge

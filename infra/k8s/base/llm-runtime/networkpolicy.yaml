apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-runtime-allow-agent-engine
  namespace: agent-platform
  labels:
    app.kubernetes.io/name: llm-runtime
    app.kubernetes.io/part-of: agent-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: inference
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-engine
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8000

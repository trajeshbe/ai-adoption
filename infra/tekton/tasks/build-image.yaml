apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-image
  namespace: agent-platform
  labels:
    app.kubernetes.io/part-of: agent-platform
spec:
  description: Build container image using Kaniko
  workspaces:
    - name: source
      description: The source code workspace
    - name: docker-config
      description: Docker config for registry authentication
      optional: true
  params:
    - name: image-name
      type: string
      description: Full image name including registry and tag
    - name: dockerfile
      type: string
      description: Path to Dockerfile relative to context
      default: Dockerfile
    - name: context
      type: string
      description: Build context directory relative to workspace
      default: .
  results:
    - name: IMAGE_DIGEST
      description: Digest of the built image
    - name: IMAGE_URL
      description: URL of the built image
  steps:
    - name: kaniko-build
      image: gcr.io/kaniko-project/executor:latest
      args:
        - --dockerfile=$(params.dockerfile)
        - --context=$(workspaces.source.path)/$(params.context)
        - --destination=$(params.image-name)
        - --digest-file=$(results.IMAGE_DIGEST.path)
        - --cache=true
        - --cache-ttl=24h
        - --snapshot-mode=redo
        - --compressed-caching=false
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.docker-config.path)
      securityContext:
        runAsUser: 0
    - name: write-url
      image: alpine:3.19
      script: |
        #!/bin/sh
        echo -n "$(params.image-name)" > "$(results.IMAGE_URL.path)"

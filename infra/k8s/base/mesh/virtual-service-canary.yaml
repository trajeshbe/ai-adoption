apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: gateway-canary
  namespace: agent-platform
spec:
  hosts:
    - gateway
  http:
    - match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: gateway-canary
            port:
              number: 8000
    - route:
        - destination:
            host: gateway
            port:
              number: 8000
          weight: 90
        - destination:
            host: gateway-canary
            port:
              number: 8000
          weight: 10
